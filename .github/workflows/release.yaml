name: Release

on:
  push:
    branches:
      - main
    paths:
      - VERSION
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.create_tag.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true

      - name: Create tag
        id: create_tag
        run: |
          version=$(cat VERSION | tr -d '\n')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$version" -m "Release $version"
          git push origin "$version"
          echo "version=$version" >> $GITHUB_OUTPUT

  release:
    needs: tag
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Get previous tag
        id: prev_tag
        run: |
          version="${{ needs.tag.outputs.version }}"
          prev=$(git tag --sort=-version:refname | grep -v "^${version}$" | head -1)
          echo "tag=$prev" >> $GITHUB_OUTPUT

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          go build -trimpath -ldflags="-s -w -X main.version=$(cat VERSION | tr -d '\n')" -o bumpflow-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} .

      - name: Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ needs.tag.outputs.version }}
          files: bumpflow-${{ matrix.goos }}-${{ matrix.goarch }}*
          body: |
            **Full Changelog**: [${{ steps.prev_tag.outputs.tag }}...${{ needs.tag.outputs.version }}](https://github.com/${{ github.repository }}/compare/${{ steps.prev_tag.outputs.tag }}...${{ needs.tag.outputs.version }})
